<div class="py-8">
  <div
    *ngIf="tracks$ | async as tracks; then tracksTemplate; else loadingTemplate"
  ></div>

  <ng-container>
    <ng-template #tracksTemplate let-tracks>
      <app-track-data-table
        [trackTableData]="trackTableData"
      ></app-track-data-table>
    </ng-template>

    <ng-template #loadingTemplate>
      <mat-spinner></mat-spinner>
    </ng-template>
  </ng-container>
</div>
